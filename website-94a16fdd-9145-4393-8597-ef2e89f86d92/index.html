<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ToolBox Pro — All-in-One Computer Works</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com">
    </script>
    <style>
        /* ── Base ── */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: #f5f7fb;
            color: #1e293b;
            transition: background 0.3s, color 0.3s;
            min-height: 100vh;
        }
        body.dark {
            background: #0f172a;
            color: #e2e8f0;
        }
        body.dark .card {
            background: #1e293b;
            border-color: #334155;
        }
        body.dark .card:hover {
            border-color: #6366f1;
        }
        body.dark .modal-content {
            background: #1e293b;
            border-color: #334155;
        }
        body.dark input,
        body.dark textarea,
        body.dark select {
            background: #0f172a;
            color: #e2e8f0;
            border-color: #334155;
        }
        body.dark .tool-card-bg {
            background: rgba(30, 41, 59, 0.6);
        }
        body.dark .bg-white {
            background: #1e293b !important;
        }
        body.dark .text-gray-700 {
            color: #cbd5e1 !important;
        }
        body.dark .text-gray-600 {
            color: #94a3b8 !important;
        }
        body.dark .text-gray-500 {
            color: #64748b !important;
        }
        body.dark .border-gray-200 {
            border-color: #334155 !important;
        }
        body.dark .bg-gray-50 {
            background: #0f172a !important;
        }
        body.dark .bg-gray-100 {
            background: #1e293b !important;
        }
        body.dark .text-gray-900 {
            color: #f1f5f9 !important;
        }
        body.dark .text-gray-800 {
            color: #e2e8f0 !important;
        }
        body.dark .shadow-md {
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.4) !important;
        }
        body.dark .shadow-lg {
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5) !important;
        }
        body.dark .shadow-xl {
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.6) !important;
        }

        /* ── Scrollbar ── */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #94a3b8;
            border-radius: 10px;
        }
        body.dark ::-webkit-scrollbar-thumb {
            background: #475569;
        }

        /* ── Header ── */
        .header-gradient {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #a855f7 100%);
        }
        body.dark .header-gradient {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 50%, #9333ea 100%);
        }

        /* ── Cards ── */
        .card {
            background: #fff;
            border: 2px solid transparent;
            border-radius: 1.25rem;
            padding: 1.75rem 1.5rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -2px rgba(0, 0, 0, 0.05);
            position: relative;
            overflow: hidden;
        }
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #6366f1, #a855f7);
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.4s ease;
        }
        .card:hover::before {
            transform: scaleX(1);
        }
        .card:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 25px -5px rgba(99, 102, 241, 0.15), 0 8px 10px -6px rgba(99, 102, 241, 0.1);
            border-color: #6366f1;
        }
        .card .icon-wrap {
            width: 56px;
            height: 56px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: #fff;
            transition: transform 0.3s ease;
        }
        .card:hover .icon-wrap {
            transform: scale(1.08);
        }
        .card .tool-count {
            font-size: 0.75rem;
            background: rgba(99, 102, 241, 0.12);
            padding: 0.2rem 0.7rem;
            border-radius: 20px;
            color: #6366f1;
            font-weight: 600;
        }
        body.dark .card .tool-count {
            background: rgba(99, 102, 241, 0.25);
            color: #a5b4fc;
        }

        /* ── Modal ── */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            animation: fadeIn 0.25s ease;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal-content {
            background: #fff;
            border-radius: 1.5rem;
            max-width: 820px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 2rem 2.25rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.3s ease;
            border: 1px solid rgba(99, 102, 241, 0.1);
            position: relative;
        }
        .modal-close {
            position: absolute;
            top: 1.25rem;
            right: 1.5rem;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            background: rgba(0, 0, 0, 0.06);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            color: #64748b;
            transition: all 0.2s;
        }
        .modal-close:hover {
            background: rgba(0, 0, 0, 0.12);
            transform: rotate(90deg);
        }
        body.dark .modal-close {
            background: rgba(255, 255, 255, 0.08);
            color: #94a3b8;
        }
        body.dark .modal-close:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        /* ── Animations ── */
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.97);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        @keyframes pulse-glow {
            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.3);
            }
            50% {
                box-shadow: 0 0 0 12px rgba(99, 102, 241, 0);
            }
        }
        .pulse-glow {
            animation: pulse-glow 1.5s infinite;
        }

        /* ── Tool Specific ── */
        .calc-btn {
            width: 100%;
            padding: 0.9rem 0.2rem;
            border: none;
            border-radius: 12px;
            font-size: 1.25rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
            background: #f1f5f9;
            color: #1e293b;
        }
        .calc-btn:hover {
            transform: scale(1.04);
        }
        .calc-btn:active {
            transform: scale(0.94);
        }
        body.dark .calc-btn {
            background: #334155;
            color: #f1f5f9;
        }
        body.dark .calc-btn:hover {
            background: #475569;
        }
        .calc-btn.op {
            background: #6366f1;
            color: #fff;
        }
        .calc-btn.op:hover {
            background: #4f46e5;
        }
        .calc-btn.eq {
            background: #a855f7;
            color: #fff;
        }
        .calc-btn.eq:hover {
            background: #9333ea;
        }
        .calc-btn.clear {
            background: #ef4444;
            color: #fff;
        }
        .calc-btn.clear:hover {
            background: #dc2626;
        }

        .todo-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.7rem 0.9rem;
            border-radius: 10px;
            background: #f8fafc;
            transition: all 0.2s;
            border: 1px solid #e2e8f0;
        }
        body.dark .todo-item {
            background: #0f172a;
            border-color: #334155;
        }
        .todo-item:hover {
            border-color: #6366f1;
        }
        .todo-item.done span {
            text-decoration: line-through;
            opacity: 0.5;
        }

        .unit-select {
            border-radius: 10px;
            padding: 0.5rem 0.75rem;
            border: 1px solid #e2e8f0;
            background: #fff;
            font-size: 0.95rem;
        }
        body.dark .unit-select {
            background: #0f172a;
            border-color: #334155;
            color: #e2e8f0;
        }

        .strength-bar {
            height: 6px;
            border-radius: 10px;
            background: #e2e8f0;
            overflow: hidden;
        }
        .strength-bar .fill {
            height: 100%;
            border-radius: 10px;
            transition: width 0.3s, background 0.3s;
        }

        .color-preview {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            border: 2px solid #e2e8f0;
            transition: background 0.2s;
        }
        body.dark .color-preview {
            border-color: #334155;
        }

        .bmi-bar {
            height: 8px;
            border-radius: 10px;
            background: linear-gradient(90deg, #22c55e 0%, #22c55e 25%, #eab308 25%, #eab308 50%, #f97316 50%, #f97316 75%, #ef4444 75%, #ef4444 100%);
            position: relative;
        }
        .bmi-indicator {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #6366f1;
            border: 3px solid #fff;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
            position: absolute;
            top: -5px;
            transition: left 0.4s ease;
        }

        /* ── Responsive ── */
        @media (max-width: 640px) {
            .modal-content {
                padding: 1.25rem 1rem;
                border-radius: 1rem;
                max-height: 95vh;
            }
            .card {
                padding: 1.25rem 1rem;
            }
            .modal-overlay {
                padding: 0.75rem;
            }
            .calc-btn {
                padding: 0.7rem 0.2rem;
                font-size: 1rem;
            }
        }

        /* ── Glassmorphism helpers ── */
        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        body.dark .glass {
            background: rgba(15, 23, 42, 0.7);
            border-color: rgba(51, 65, 85, 0.4);
        }

        /* ── Tagify ── */
        .tag {
            display: inline-block;
            padding: 0.2rem 0.7rem;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.02em;
        }

        /* smooth scroll */
        html {
            scroll-behavior: smooth;
        }
    </style>
</head>
<body>

    <!-- ════════════════════ HEADER ════════════════════ -->
    <header class="header-gradient text-white">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-5 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-white/20 rounded-xl flex items-center justify-center text-xl backdrop-blur-sm">
                    <i class="fas fa-cubes"></i>
                </div>
                <div>
                    <h1 class="text-xl sm:text-2xl font-bold tracking-tight">ToolBox Pro</h1>
                    <p class="text-xs text-white/70 hidden sm:block">All-in-One Computer Works</p>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <button id="themeToggle" class="w-9 h-9 rounded-xl bg-white/15 flex items-center justify-center hover:bg-white/25 transition text-sm" aria-label="Toggle theme">
                    <i class="fas fa-moon" id="themeIcon"></i>
                </button>
                <span class="text-xs text-white/60 hidden sm:inline"><i class="far fa-clock mr-1"></i> <span id="liveClock"></span></span>
            </div>
        </div>
    </header>

    <!-- ════════════════════ TOOLS GRID ════════════════════ -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 sm:py-10">
        <div class="flex items-center justify-between mb-7">
            <div>
                <h2 class="text-2xl sm:text-3xl font-bold tracking-tight">🧰 All Tools</h2>
                <p class="text-sm text-gray-500 mt-1">Click any tool to open and use it instantly.</p>
            </div>
            <div class="text-xs text-gray-400 flex items-center gap-1">
                <i class="fas fa-th-large"></i> <span id="toolCount">12</span> tools
            </div>
        </div>

        <div id="toolsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5">
            <!-- Cards injected by JS -->
        </div>
    </main>

    <!-- ════════════════════ FOOTER ════════════════════ -->
    <footer class="text-center text-xs text-gray-400 py-6 border-t border-gray-200/60 dark:border-gray-800/60 mt-6">
        <p>ToolBox Pro &mdash; built with <i class="fas fa-heart text-red-400"></i> for everyday computer tasks</p>
    </footer>

    <!-- ════════════════════ MODAL ════════════════════ -->
    <div id="modalOverlay" class="modal-overlay">
        <div class="modal-content" id="modalContent">
            <button class="modal-close" id="modalClose"><i class="fas fa-times"></i></button>
            <div id="modalBody"></div>
        </div>
    </div>

    <!-- ════════════════════ JAVASCRIPT ════════════════════ -->
    <script>
        (function() {
            'use strict';

            // ─── Tools Data ───────────────────────────────────────
            const TOOLS = [{
                id: 'calculator',
                name: 'Calculator',
                desc: 'Basic arithmetic with a clean interface',
                icon: 'fas fa-calculator',
                color: '#6366f1',
                bg: 'bg-indigo-500'
            }, {
                id: 'notepad',
                name: 'Notepad',
                desc: 'Write notes with word & character count',
                icon: 'fas fa-file-alt',
                color: '#22c55e',
                bg: 'bg-green-500'
            }, {
                id: 'units',
                name: 'Unit Converter',
                desc: 'Length, weight, temperature conversions',
                icon: 'fas fa-exchange-alt',
                color: '#f59e0b',
                bg: 'bg-amber-500'
            }, {
                id: 'colorpicker',
                name: 'Color Picker',
                desc: 'Pick & preview colors in HEX / RGB / HSL',
                icon: 'fas fa-palette',
                color: '#ec4899',
                bg: 'bg-pink-500'
            }, {
                id: 'stopwatch',
                name: 'Stopwatch',
                desc: 'Precise timer with lap recording',
                icon: 'fas fa-stopwatch',
                color: '#14b8a6',
                bg: 'bg-teal-500'
            }, {
                id: 'timer',
                name: 'Timer',
                desc: 'Countdown timer with alert',
                icon: 'fas fa-hourglass-half',
                color: '#f97316',
                bg: 'bg-orange-500'
            }, {
                id: 'todo',
                name: 'To-Do List',
                desc: 'Manage tasks with local storage',
                icon: 'fas fa-check-double',
                color: '#8b5cf6',
                bg: 'bg-violet-500'
            }, {
                id: 'password',
                name: 'Password Generator',
                desc: 'Strong passwords with options',
                icon: 'fas fa-key',
                color: '#ef4444',
                bg: 'bg-red-500'
            }, {
                id: 'wordcounter',
                name: 'Word Counter',
                desc: 'Count words, chars, sentences & more',
                icon: 'fas fa-align-left',
                color: '#06b6d4',
                bg: 'bg-cyan-500'
            }, {
                id: 'random',
                name: 'Random Numbers',
                desc: 'Generate random numbers in any range',
                icon: 'fas fa-dice',
                color: '#a855f7',
                bg: 'bg-purple-500'
            }, {
                id: 'bmi',
                name: 'BMI Calculator',
                desc: 'Body Mass Index with health category',
                icon: 'fas fa-weight',
                color: '#3b82f6',
                bg: 'bg-blue-500'
            }, {
                id: 'age',
                name: 'Age Calculator',
                desc: 'Exact age in years, months & days',
                icon: 'fas fa-birthday-cake',
                color: '#e11d48',
                bg: 'bg-rose-500'
            }];

            // ─── State ────────────────────────────────────────────
            let currentTool = null;
            let isDark = localStorage.getItem('toolbox-theme') === 'dark' ||
                (!localStorage.getItem('toolbox-theme') && window.matchMedia('(prefers-color-scheme: dark)').matches);
            let stopwatchInterval = null;
            let stopwatchData = { running: false, time: 0, laps: [] };
            let timerInterval = null;
            let timerData = { running: false, remaining: 0, total: 0 };

            // ─── DOM refs ─────────────────────────────────────────
            const grid = document.getElementById('toolsGrid');
            const modalOverlay = document.getElementById('modalOverlay');
            const modalBody = document.getElementById('modalBody');
            const modalClose = document.getElementById('modalClose');
            const themeToggle = document.getElementById('themeToggle');
            const themeIcon = document.getElementById('themeIcon');
            const liveClock = document.getElementById('liveClock');
            const toolCount = document.getElementById('toolCount');

            // ─── Theme ────────────────────────────────────────────
            function applyTheme(dark) {
                isDark = dark;
                document.body.classList.toggle('dark', dark);
                themeIcon.className = dark ? 'fas fa-sun' : 'fas fa-moon';
                localStorage.setItem('toolbox-theme', dark ? 'dark' : 'light');
            }
            applyTheme(isDark);
            themeToggle.addEventListener('click', () => applyTheme(!isDark));

            // ─── Clock ────────────────────────────────────────────
            function updateClock() {
                const now = new Date();
                liveClock.textContent = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            }
            updateClock();
            setInterval(updateClock, 10000);

            // ─── Render Grid ──────────────────────────────────────
            function renderGrid() {
                grid.innerHTML = '';
                TOOLS.forEach(t => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                <div class="flex items-start gap-4">
                  <div class="icon-wrap ${t.bg}" style="background:${t.color}">
                    <i class="${t.icon}"></i>
                  </div>
                  <div class="flex-1 min-w-0">
                    <h3 class="font-semibold text-lg truncate">${t.name}</h3>
                    <p class="text-sm text-gray-500 dark:text-gray-400 mt-0.5 leading-snug">${t.desc}</p>
                  </div>
                </div>
                <div class="mt-4 flex items-center justify-between">
                  <span class="tool-count"><i class="fas fa-arrow-right mr-1 text-xs"></i> Open</span>
                </div>
              `;
                    card.addEventListener('click', () => openTool(t.id));
                    grid.appendChild(card);
                });
                toolCount.textContent = TOOLS.length;
            }
            renderGrid();

            // ─── Open / Close Modal ──────────────────────────────
            function openTool(id) {
                const tool = TOOLS.find(t => t.id === id);
                if (!tool) return;
                currentTool = id;
                modalOverlay.classList.add('active');
                document.body.style.overflow = 'hidden';
                renderTool(tool);
            }

            function closeModal() {
                modalOverlay.classList.remove('active');
                document.body.style.overflow = '';
                // cleanup intervals
                if (stopwatchInterval) { clearInterval(stopwatchInterval);
                    stopwatchInterval = null; }
                if (timerInterval) { clearInterval(timerInterval);
                    timerInterval = null; }
                stopwatchData.running = false;
                timerData.running = false;
                currentTool = null;
            }

            modalClose.addEventListener('click', closeModal);
            modalOverlay.addEventListener('click', (e) => {
                if (e.target === modalOverlay) closeModal();
            });
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && modalOverlay.classList.contains('active')) closeModal();
            });

            // ─── Render Tool Content ──────────────────────────────
            function renderTool(tool) {
                const map = {
                    calculator: renderCalculator,
                    notepad: renderNotepad,
                    units: renderUnits,
                    colorpicker: renderColorPicker,
                    stopwatch: renderStopwatch,
                    timer: renderTimer,
                    todo: renderTodo,
                    password: renderPassword,
                    wordcounter: renderWordCounter,
                    random: renderRandom,
                    bmi: renderBMI,
                    age: renderAge
                };
                const fn = map[tool.id];
                if (fn) {
                    modalBody.innerHTML = `
                <div class="mb-5 flex items-center gap-3">
                  <div class="w-10 h-10 rounded-xl flex items-center justify-center text-white text-lg" style="background:${tool.color}">
                    <i class="${tool.icon}"></i>
                  </div>
                  <div>
                    <h3 class="text-xl font-bold">${tool.name}</h3>
                    <p class="text-sm text-gray-500 dark:text-gray-400">${tool.desc}</p>
                  </div>
                </div>
                <div id="toolBody"></div>
              `;
                    fn();
                }
            }

            // ──── 1. CALCULATOR ──────────────────────────────────
            function renderCalculator() {
                const body = document.getElementById('toolBody');
                body.innerHTML = `
              <div class="max-w-xs mx-auto">
                <div class="bg-gray-100 dark:bg-gray-900 rounded-xl p-4 mb-3 text-right">
                  <div id="calcDisplay" class="text-3xl font-bold tracking-tight truncate text-gray-900 dark:text-white">0</div>
                  <div id="calcPreview" class="text-sm text-gray-400 dark:text-gray-500 mt-1 h-5 truncate"></div>
                </div>
                <div class="grid grid-cols-4 gap-2">
                  ${['C','±','%','÷','7','8','9','×','4','5','6','−','1','2','3','+','0','.','⌫','='].map(v => `
                    <button class="calc-btn ${v === '=' ? 'eq' : ['C','±','%','⌫'].includes(v) ? 'clear' : ['÷','×','−','+'].includes(v) ? 'op' : ''}" data-val="${v}">${v}</button>
                  `).join('')}
                </div>
              </div>
            `;
                let display = document.getElementById('calcDisplay');
                let preview = document.getElementById('calcPreview');
                let expr = '',
                    result = null,
                    justEvaluated = false;

                function updateDisplay() {
                    display.textContent = expr || '0';
                }

                function evaluate() {
                    try {
                        let e = expr.replace(/×/g, '*').replace(/÷/g, '/').replace(/−/g, '-');
                        let res = Function('"use strict"; return (' + e + ')')();
                        if (isFinite(res)) {
                            result = res;
                            preview.textContent = '= ' + parseFloat(res.toFixed(10));
                        } else {
                            preview.textContent = 'Error';
                        }
                    } catch { preview.textContent = ''; }
                }

                body.querySelectorAll('.calc-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const v = btn.dataset.val;
                        if (v === 'C') { expr = '';
                            result = null;
                            preview.textContent = '';
                            justEvaluated = false; } else if (v === '⌫') { expr = expr.slice(0, -1);
                            justEvaluated = false; } else if (v === '=') {
                            if (expr) evaluate();
                            if (result !== null) { expr = String(parseFloat(result.toFixed(10)));
                                preview.textContent = '';
                                justEvaluated = true; }
                        } else if (v === '±') {
                            if (expr.startsWith('-')) expr = expr.slice(1);
                            else if (expr && expr !== '0') expr = '-' + expr;
                        } else if (v === '%') {
                            if (expr) { expr = String(parseFloat(expr) / 100); }
                        } else {
                            if (justEvaluated && /[0-9]/.test(v)) { expr = v;
                                justEvaluated = false; } else if (justEvaluated) { expr = expr + v;
                                justEvaluated = false; } else { expr += v; }
                        }
                        updateDisplay();
                        if (v !== '=' && expr) evaluate();
                        if (!expr) { preview.textContent = '';
                            display.textContent = '0'; }
                    });
                });
                updateDisplay();
            }

                const body = document.getElementById('toolBody');

                        toBase: { mm: 0.001, cm: 0.01, m: 1, km: 1000, in: 0.0254, ft: 0.3048, yd: 0.9144,
                            mi: 1609.344 } },
                    weight: { units: ['mg', 'g', 'kg', 't', 'oz', 'lb'], base: 'g',

                </div>
              </div>
            `;
                const cat = document.getElementById('unitCat');
                const input = document.getElementById('unitInput');
                const from = document.getElementById('unitFrom');
                const to = document.getElementById('unitTo');
                const result = document.getElementById('unitResult');

                function populate(category) {
                    const data = conv[category];
                    from.innerHTML = '';
                    to.innerHTML = '';
                    data.units.forEach(u => {
                        from.innerHTML += `<option value="${u}">${u}</option>`;
                        to.innerHTML += `<option value="${u}">${u}</option>`;
                    });
                    to.value = data.units[1] || data.units[0];
                    convert();
                }

                function convert() {
                    const category = cat.value;
                    const data = conv[category];
                    const val = parseFloat(input.value) || 0;
                    const f = from.value,
                        t = to.value;
                    if (category === 'temperature') {
                        let c;
                        if (f === 'Celsius') c = val;
                        else if (f === 'Fahrenheit') c = (val - 32) * 5 / 9;
                        else c = val - 273.15;

                        if (t === 'Celsius') res = c;
                        else if (t === 'Fahrenheit') res = c * 9 / 5 + 32;
                        else res = c + 273.15;
                        result.textContent = res.toFixed(2);
                    } else {
                        const baseVal = val * data.toBase[f];
                        const res = baseVal / data.toBase[t];
                        result.textContent = res.toFixed(6);
                    }
                }
                cat.addEventListener('change', () => populate(cat.value));
                input.addEventListener('input', convert);
                from.addEventListener('change', convert);
                to.addEventListener('change', convert);

            function renderColorPicker() {
                const body = document.getElementById('toolBody');
                body.innerHTML = `
              <div class="flex flex-col sm:flex-row items-center gap-6 max-w-lg mx-auto">

            `;
                const picker = document.getElementById('colorInput');
                const hex = document.getElementById('hexVal');
                const rgb = document.getElementById('rgbVal');
                const hsl = document.getElementById('hslVal');

                function hexToRgb(h) {
                    const r = parseInt(h.slice(1, 3), 16),
                        g = parseInt(h.slice(3, 5), 16),
                        b = parseInt(h.slice(5, 7), 16);
                    return { r, g, b };
                }

                function rgbToHsl(r, g, b) {
                    r /= 255;
                    g /= 255;
                    b /= 255;
                    const max = Math.max(r, g, b),
                        min = Math.min(r, g, b);
                    let h, s, l = (max + min) / 2;
                    if (max === min) { h = s = 0; } else {
                        const d = max - min;
                        s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
                        if (max === r) h = ((g - b) / d + (g < b ? 6 : 0)) / 6;
                        else if (max === g) h = ((b - r) / d + 2) / 6;
                        else h = ((r - g) / d + 4) / 6;
                    }
                    return { h: Math.round(h * 360), s: Math.round(s * 100), l: Math.round(l * 100) };
                }

                function update() {
                    const c = picker.value;
                    hex.value = c.toUpperCase();
                    const { r, g, b } = hexToRgb(c);
                    rgb.value = `rgb(${r}, ${g}, ${b})`;
                    const { h, s, l } = rgbToHsl(r, g, b);
                    hsl.value = `hsl(${h}, ${s}%, ${l}%)`;
                }
                picker.addEventListener('input', update);
                update();

                document.getElementById('copyHex').addEventListener('click', () => navigator.clipboard.writeText(hex.value));

                const lenSlider = document.getElementById('pwLen');
                const lenVal = document.getElementById('pwLenVal');
                const upper = document.getElementById('pwupper');
                const lower = document.getElementById('pwlower');
                const numbers = document.getElementById('pwnumbers');
                const symbols = document.getElementById('pwsymbols');
                const strength = document.getElementById('pwStrength');
                const strengthLabel = document.getElementById('pwStrengthLabel');

                function calcStrength() {
                    let score = 0;
                    const len = parseInt(lenSlider.value);
                    if (len >= 8) score += 25;
                    if (len >= 12) score += 15;
                    if (len >= 20) score += 10;
                    if (upper.checked) score += 15;
                    if (lower.checked) score += 10;
                    if (numbers.checked) score += 15;
                    if (symbols.checked) score += 25;
                    const pct = Math.min(100, score);
                    strength.style.width = pct + '%';
                    if (pct < 30) { strength.style.background = '#ef4444';
                        strengthLabel.textContent = 'Weak'; } else if (pct < 60) { strength.style.background = '#f59e0b';
                        strengthLabel.textContent = 'Fair'; } else if (pct < 85) { strength.style.background = '#6366f1';
                        strengthLabel.textContent = 'Strong'; } else { strength.style.background = '#22c55e';
                        strengthLabel.textContent = 'Very Strong'; }
                }

                function generate() {
                    const len = parseInt(lenSlider.value);
                    const chars = [];
                    if (upper.checked) chars.push(...'ABCDEFGHIJKLMNOPQRSTUVWXYZ');
                    if (lower.checked) chars.push(...'abcdefghijklmnopqrstuvwxyz');
                    if (numbers.checked) chars.push(...'0123456789');
                    if (symbols.checked) chars.push(...'!@#$%^&*()_+-=[]{}|;:,.<>?');
                    if (!chars.length) { out.value = 'Select at least one type'; return; }
                    let pw = '';
                    for (let i = 0; i < len; i++) pw += chars[Math.floor(Math.random() * chars.length)];
                    out.value = pw;
                    calcStrength();
                }
                lenSlider.addEventListener('input', () => { lenVal.textContent = lenSlider.value;
                    generate(); });
                [upper, lower, numbers, symbols].forEach(cb => cb.addEventListener('change', generate));
                document.getElementById('pwGenerate').addEventListener('click', generate);
                document.getElementById('pwCopy').addEventListener('click', () => {
                    if (out.value) navigator.clipboard.writeText(out.value);
                });
                generate();
            }

            // ──── 9. WORD COUNTER ─────────────────────────────────
            function renderWordCounter() {
                const body = document.getElementById('toolBody');
                body.innerHTML = `
              <div class="space-y-3 max-w-lg mx-auto">
                <textarea id="wcInput" class="w-full h-44 p-4 border border-gray-200 dark:border-gray-700 rounded-xl resize-y focus:ring-2 focus:ring-cyan-400 focus:outline-none text-sm" placeholder="Paste or type your text here..."></textarea>
                <div class="grid grid-cols-2 sm:grid-cols-4 gap-2 text-center text-sm">
                  <div class="bg-cyan-50 dark:bg-cyan-900/20 p-3 rounded-xl"><span class="text-2xl font-bold text-cyan-600 dark:text-cyan-400" id="wcWords">0</span><br /><span class="text-xs text-gray-500 dark:text-gray-400">Words</span></div>
                  <div class="bg-cyan-50 dark:bg-cyan-900/20 p-3 rounded-xl"><span class="text-2xl font-bold text-cyan-600 dark:text-cyan-400" id="wcChars">0</span><br /><span class="text-xs text-gray-500 dark:text-gray-400">Chars</span></div>
                  <div class="bg-cyan-50 dark:bg-cyan-900/20 p-3 rounded-xl"><span class="text-2xl font-bold text-cyan-600 dark:text-cyan-400" id="wcSentences">0</span><br /><span class="text-xs text-gray-500 dark:text-gray-400">Sentences</span></div>
                  <div class="bg-cyan-50 dark:bg-cyan-900/20 p-3 rounded-xl"><span class="text-2xl font-bold text-cyan-600 dark:text-cyan-400" id="wcParas">0</span><br /><span class="text-xs text-gray-500 dark:text-gray-400">Paragraphs</span></div>
                </div>
              </div>
            `;
                const input = document.getElementById('wcInput');
                const wcWords = document.getElementById('wcWords');
                const wcChars = document.getElementById('wcChars');
                const wcSentences = document.getElementById('wcSentences');
                const wcParas = document.getElementById('wcParas');

                function updateWC() {
                    const t = input.value;
                    wcChars.textContent = t.length;
                    wcWords.textContent = t.trim() ? t.trim().split(/\s+/).length : 0;
                    wcSentences.textContent = t ? t.split(/[.!?]+/).filter(s => s.trim()).length : 0;
                    wcParas.textContent = t ? t.split(/\n+/).filter(p => p.trim()).length : 0;
                }
                input.addEventListener('input', updateWC);
                updateWC();
            }

            // ──── 10. RANDOM NUMBER GENERATOR ─────────────────────
            function renderRandom() {
                const body = document.getElementById('toolBody');
                body.innerHTML = `
              <div class="max-w-xs mx-auto space-y-4 text-center">
                <div class="flex gap-2">
                  <div class="flex-1"><label class="text-xs text-gray-500 dark:text-gray-400">Min</label><input id="randMin" type="number" value="1" class="w-full px-3 py-2 border border-gray-200 dark:border-gray-700 rounded-xl text-center text-lg font-bold focus:ring-2 focus:ring-purple-400 focus:outline-none" /></div>
                  <div class="flex-1"><label class="text-xs text-gray-500 dark:text-gray-400">Max</label><input id="randMax" type="number" value="100" class="w-full px-3 py-2 border border-gray-200 dark:border-gray-700 rounded-xl text-center text-lg font-bold focus:ring-2 focus:ring-purple-400 focus:outline-none" /></div>
                </div>
                <div class="text-5xl font-bold text-purple-600 dark:text-purple-400 py-3" id="randResult">—</div>
                <button id="randGen" class="px-6 py-2.5 bg-purple-500 text-white rounded-xl hover:bg-purple-600 transition font-medium"><i class="fas fa-dice mr-1"></i> Generate</button>
                <div class="text-left">
                  <p class="text-xs text-gray-400 mb-1">History</p>
                  <ul id="randHistory" class="flex flex-wrap gap-1.5 max-h-20 overflow-y-auto"></ul>
                </div>
              </div>
            `;
                const min = document.getElementById('randMin');
                const max = document.getElementById('randMax');
                const result = document.getElementById('randResult');
                const history = document.getElementById('randHistory');
                const hist = [];

                document.getElementById('randGen').addEventListener('click', () => {
                    const lo = parseInt(min.value) || 0;
                    const hi = parseInt(max.value) || 100;
                    if (lo > hi) { result.textContent = '⚠️'; return; }
                    const r = Math.floor(Math.random() * (hi - lo + 1)) + lo;
                    result.textContent = r;
                    hist.push(r);
                    const li = document.createElement('li');
                    li.className = 'text-xs bg-gray-100 dark:bg-gray-800 px-2 py-0.5 rounded-lg font-mono';
                    li.textContent = r;
                    history.prepend(li);
                    if (hist.length > 20) { hist.shift();
                        history.lastChild?.remove(); }
                });
            }

            // ──── 11. BMI CALCULATOR ──────────────────────────────
            function renderBMI() {
                const body = document.getElementById('toolBody');
                body.innerHTML = `
              <div class="max-w-sm mx-auto space-y-4">
                <div class="flex gap-3">
                  <div class="flex-1"><label class="text-xs text-gray-500 dark:text-gray-400">Height (cm)</label><input id="bmiH" type="number" value="175" class="w-full px-3 py-2 border border-gray-200 dark:border-gray-700 rounded-xl text-center text-lg font-semibold focus:ring-2 focus:ring-blue-400 focus:outline-none" /></div>
                  <div class="flex-1"><label class="text-xs text-gray-500 dark:text-gray-400">Weight (kg)</label><input id="bmiW" type="number" value="70" class="w-full px-3 py-2 border border-gray-200 dark:border-gray-700 rounded-xl text-center text-lg font-semibold focus:ring-2 focus:ring-blue-400 focus:outline-none" /></div>
                </div>
                <div class="text-center">
                  <div class="text-4xl font-bold text-blue-600 dark:text-blue-400" id="bmiVal">22.9</div>
                  <div class="text-sm text-gray-500 dark:text-gray-400" id="bmiCategory">Normal weight</div>
                </div>
                <div class="bmi-bar relative">
                  <div class="bmi-indicator" id="bmiIndicator" style="left:45%"></div>
                </div>
                <div class="flex justify-between text-[10px] text-gray-400 -mt-1">
                  <span>Underweight</span><span>Normal</span><span>Overweight</span><span>Obese</span>
                </div>
                <button id="bmiCalc" class="w-full px-4 py-2.5 bg-blue-500 text-white rounded-xl hover:bg-blue-600 transition font-medium"><i class="fas fa-calculator mr-1"></i> Calculate</button>
              </div>
            `;
                const hInput = document.getElementById('bmiH');
                const wInput = document.getElementById('bmiW');
                const val = document.getElementById('bmiVal');
                const cat = document.getElementById('bmiCategory');
                const ind = document.getElementById('bmiIndicator');

                function calcBMI() {
                    const h = parseFloat(hInput.value) / 100 || 1;
                    const w = parseFloat(wInput.value) || 0;
                    const bmi = w / (h * h);
                    const rounded = Math.round(bmi * 10) / 10;
                    val.textContent = isFinite(bmi) ? rounded : '—';
                    let category, color, pct;
                    if (bmi < 18.5) { category = 'Underweight';
                        pct = 10;
                        color = '#f59e0b'; } else if (bmi < 25) { category = 'Normal weight';
                        pct = 35;
                        color = '#22c55e'; } else if (bmi < 30) { category = 'Overweight';
                        pct = 60;
                        color = '#f97316'; } else { category = 'Obese';
                        pct = 85;
                        color = '#ef4444'; }
                    cat.textContent = category;
                    ind.style.left = pct + '%';
                    ind.style.background = color;
                    val.style.color = color;
                }
                document.getElementById('bmiCalc').addEventListener('click', calcBMI);
                calcBMI();
            }

            // ──── 12. AGE CALCULATOR ──────────────────────────────
            function renderAge() {
                const body = document.getElementById('toolBody');
                const today = new Date().toISOString().slice(0, 10);
                body.innerHTML = `
              <div class="max-w-xs mx-auto space-y-4 text-center">
                <div><label class="text-xs text-gray-500 dark:text-gray-400">Date of Birth</label><input id="ageDob" type="date" value="2000-01-01" max="${today}" class="w-full px-3 py-2 border border-gray-200 dark:border-gray-700 rounded-xl text-center text-lg focus:ring-2 focus:ring-rose-400 focus:outline-none" /></div>
                <button id="ageCalc" class="px-6 py-2.5 bg-rose-500 text-white rounded-xl hover:bg-rose-600 transition font-medium"><i class="fas fa-birthday-cake mr-1"></i> Calculate Age</button>
                <div class="grid grid-cols-3 gap-2">
                  <div class="bg-rose-50 dark:bg-rose-900/20 p-3 rounded-xl"><span class="text-3xl font-bold text-rose-500" id="ageYears">—</span><br /><span class="text-xs text-gray-500 dark:text-gray-400">Years</span></div>
                  <div class="bg-rose-50 dark:bg-rose-900/20 p-3 rounded-xl"><span class="text-3xl font-bold text-rose-500" id="ageMonths">—</span><br /><span class="text-xs text-gray-500 dark:text-gray-400">Months</span></div>
                  <div class="bg-rose-50 dark:bg-rose-900/20 p-3 rounded-xl"><span class="text-3xl font-bold text-rose-500" id="ageDays">—</span><br /><span class="text-xs text-gray-500 dark:text-gray-400">Days</span></div>
                </div>
                <p class="text-sm text-gray-400" id="ageTotalDays"></p>
              </div>
            `;
                const dob = document.getElementById('ageDob');
                const yS = document.getElementById('ageYears');
                const mS = document.getElementById('ageMonths');
                const dS = document.getElementById('ageDays');
                const total = document.getElementById('ageTotalDays');

                document.getElementById('ageCalc').addEventListener('click', () => {
                    const d = new Date(dob.value);
                    if (isNaN(d.getTime())) { yS.textContent = '—';
                        mS.textContent = '—';
                        dS.textContent = '—';
                        total.textContent = ''; return; }
                    const now = new Date();
                    let y = now.getFullYear() - d.getFullYear();
                    let m = now.getMonth() - d.getMonth();
                    let day = now.getDate() - d.getDate();
                    if (day < 0) { m--;
                        day += new Date(now.getFullYear(), now.getMonth(), 0).getDate(); }
                    if (m < 0) { y--;
                        m += 12; }
                    yS.textContent = y;
                    mS.textContent = m;
                    dS.textContent = day;
                    const diffMs = now - d;
                    const totalDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));
                    total.textContent = `≈ ${totalDays.toLocaleString()} days old`;
                });
                // auto-calc on open
                setTimeout(() => document.getElementById('ageCalc').click(), 50);
            }

        })();
    </script>
</body>
</html>
